server:
  port: ${DATACENTER_API_PORT:8091}

spring:
  datasource:
    url: ${DATACENTER_DB_URL}
    username: ${DATACENTER_DB_USERNAME}
    password: ${DATACENTER_DB_PASSWORD}

datacenter:
  internal-token: ${MF_DATACENTER_INTERNAL_TOKEN}
  internal-identity-secret: ${MF_DATACENTER_IDENTITY_SECRET}
  storage:
    ai-data-file: ${DATACENTER_AI_DATA_FILE:data/ai-store.json}
  mysql:
    enabled: true
    database: ${DATACENTER_DB_NAME:mf_datacenter}
  scheduler:
    enabled: ${DATACENTER_SCHEDULER_ENABLED:true}
  mf-ep:
    ai-content:
      base-url: ${MF_EP_BASE_URL}
      internal-token: ${MF_EP_INTERNAL_TOKEN}
    datasource:
      enabled: ${MF_EP_DATASOURCE_ENABLED:false}
      url: ${MF_EP_DB_URL:}
      username: ${MF_EP_DB_USERNAME:}
      password: ${MF_EP_DB_PASSWORD:}
