server:
  port: ${DATACENTER_API_PORT:8091}

spring:
  datasource:
    url: ${DATACENTER_DB_URL:jdbc:mysql://127.0.0.1:3306/mf_datacenter?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DATACENTER_DB_USERNAME:root}
    password: ${DATACENTER_DB_PASSWORD:123456}

datacenter:
  storage:
    ai-data-file: ${DATACENTER_AI_DATA_FILE:data/ai-store.json}
  mysql:
    enabled: true
    database: ${DATACENTER_DB_NAME:mf_datacenter}
  scheduler:
    enabled: ${DATACENTER_SCHEDULER_ENABLED:true}
  mf-ep:
    datasource:
      enabled: ${MF_EP_DATASOURCE_ENABLED:true}
      url: ${MF_EP_DB_URL:jdbc:mysql://127.0.0.1:3306/fertilizer?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
      username: ${MF_EP_DB_USERNAME:root}
      password: ${MF_EP_DB_PASSWORD:123456}
