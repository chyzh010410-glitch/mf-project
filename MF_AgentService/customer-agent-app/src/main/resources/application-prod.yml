spring:
  config:
    activate:
      on-profile: prod
  ai:
    model:
      chat: ${MF_AGENT_SPRING_AI_CHAT_MODEL:openai}

mf:
  ep:
    base-url: ${MF_EP_BASE_URL}
    internal-token: ${MF_EP_INTERNAL_TOKEN}
  datacenter:
    base-url: ${MF_DATACENTER_BASE_URL}
  agent:
    llm-enabled: ${MF_AGENT_LLM_ENABLED:false}
    knowledge-sync-key: ${MF_AGENT_KNOWLEDGE_SYNC_KEY}
    knowledge-sync-poll-interval: ${MF_AGENT_KNOWLEDGE_SYNC_POLL_INTERVAL:30s}
    knowledge-sync-max-retries: ${MF_AGENT_KNOWLEDGE_SYNC_MAX_RETRIES:5}
    knowledge-sync-pending-timeout: ${MF_AGENT_KNOWLEDGE_SYNC_PENDING_TIMEOUT:5m}
