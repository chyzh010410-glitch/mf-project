services:
  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 3s
      retries: 12
  embedding:
    build: ./MF_EmbeddingService
    environment:
      MF_EMBEDDING_MODEL: ${MF_EMBEDDING_MODEL:-BAAI/bge-m3}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 12
volumes:
  qdrant_data:
