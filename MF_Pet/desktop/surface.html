<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><style>
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;background:transparent;font-family:"Microsoft YaHei","PingFang SC",sans-serif;color:#18212b}#surface{height:100%;padding:10px;border-radius:16px;background:rgba(255,255,255,.98);box-shadow:0 14px 32px rgba(18,24,34,.24);border:1px solid rgba(17,24,39,.08)}button,input{font:inherit}button{cursor:pointer}.head{height:36px;display:flex;align-items:center;justify-content:space-between;padding:0 5px 7px;font-size:16px;font-weight:700}.close{border:0;background:transparent;font-size:24px;color:#6b7280}.menu button{display:block;width:100%;min-height:44px;padding:0 15px;border:0;background:transparent;text-align:left;color:#111827;font-size:16px}.menu button:hover{background:#f0f2f5}.divider{height:1px;margin:7px 0;background:#e5e7eb}.chat{display:grid;grid-template-rows:auto 1fr auto;height:100%;gap:8px}.messages{overflow:auto;display:grid;align-content:start;gap:8px;padding:5px}.message{max-width:92%;padding:9px 11px;border-radius:10px;background:#f1f5f9;white-space:pre-wrap;font-size:14px;line-height:1.5}.message.user{justify-self:end;background:#dff5e7}.composer{display:grid;grid-template-columns:1fr auto;gap:8px}.composer input{min-width:0;height:38px;padding:0 10px;border:1px solid #d1d5db;border-radius:8px;outline:none}.composer button{padding:0 14px;border:0;border-radius:8px;background:#d97757;color:#fff;font-weight:700}.hidden{display:none!important}
</style></head><body><main id="surface"><section id="menu" class="menu"><div class="head">苗丰精灵<button class="close" data-close>×</button></div><button data-chat>问苗丰精灵</button><button data-dashboard>打开 Dashboard</button><div class="divider"></div><button data-settings>设置...</button><button data-hide>隐藏桌宠</button></section><section id="chat" class="chat hidden"><div class="head">问苗丰精灵<button class="close" data-menu>×</button></div><div id="messages" class="messages"></div><form id="composer" class="composer"><input id="input" autocomplete="off" placeholder="输入关于作物、施肥或商品的问题"><button>发送</button></form></section></main><script>
const menu=document.getElementById('menu'),chat=document.getElementById('chat'),messages=document.getElementById('messages'),input=document.getElementById('input');
function setMode(mode){menu.classList.toggle('hidden',mode==='chat');chat.classList.toggle('hidden',mode!=='chat');if(mode==='chat')setTimeout(()=>input.focus(),0)}
function add(text,role){const item=document.createElement('div');item.className=`message ${role}`;item.textContent=text;messages.append(item);messages.scrollTop=messages.scrollHeight}
document.querySelector('[data-chat]').onclick=()=>window.mfPetSurface.openChat();document.querySelector('[data-dashboard]').onclick=()=>window.mfPetSurface.openDashboard();document.querySelector('[data-settings]').onclick=()=>window.mfPetSurface.openSettings();document.querySelector('[data-hide]').onclick=()=>window.mfPetSurface.hidePet();document.querySelectorAll('[data-close]').forEach(el=>el.onclick=()=>window.mfPetSurface.close());document.querySelector('[data-menu]').onclick=()=>window.mfPetSurface.openMenu();
document.getElementById('composer').addEventListener('submit',async event=>{event.preventDefault();const text=input.value.trim();if(!text)return;input.value='';add(text,'user');try{const result=await window.mfPetSurface.agentChat({sessionId:'mf-pet-desktop',message:text,userId:localStorage.getItem('mf-pet-user-id')||'1001',userType:localStorage.getItem('mf-pet-user-type')||'client',authToken:localStorage.getItem('mf-pet-auth-token')||''});const tools=Array.isArray(result?.usedTools)&&result.usedTools.length?`\n\n工具：${result.usedTools.map(x=>x.name).join('、')}`:'';add(`${result?.answer||'苗丰精灵暂时没有拿到有效回答。'}${tools}`,'assistant')}catch(error){add(`当前无法连接本地 AgentService：${error.message}`,'assistant')}});
window.mfPetSurface.onShow(({mode})=>setMode(mode));
</script></body></html>
