<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><style>
  html,body{width:100%;height:100%;margin:0;overflow:hidden;background:transparent}
  #pet-clip{position:absolute;inset:0;overflow:hidden}#pet-container{position:absolute;inset:0}
  #pet-container object{position:absolute;width:190%;height:130%;left:-45%;bottom:-5%;border:0;opacity:1;filter:drop-shadow(0 8px 10px rgba(0,0,0,.22));image-rendering:pixelated;transition:opacity 100ms ease-out}
  body[data-mini="left"] #pet-container{transform:scaleX(-1)}
</style></head><body><div id="pet-clip"><div id="pet-container"></div></div><script>
const container=document.getElementById('pet-container');let pet=null,currentState='idle',eye={x:0,y:0};
function assetUrl(asset){return `../clawd-on-desk/assets/svg/${asset}`}
function applyEyes(){if(!pet?.contentDocument)return;const eyes=pet.contentDocument.getElementById('eyes-js');if(eyes)eyes.setAttribute('transform',`translate(${eye.x.toFixed(1)} ${eye.y.toFixed(1)})`)}
function swap({state,asset}){if(!asset)return;currentState=state||'idle';const next=document.createElement('object');next.type='image/svg+xml';next.data=`${assetUrl(asset)}?_t=${Date.now()}`;next.addEventListener('load',()=>{if(next!==pet){const old=pet;pet=next;applyEyes();if(old)old.remove()}}, {once:true});container.append(next)}
window.mfPetRender.onVisual(swap);
window.mfPetRender.onMini(({edge})=>document.body.dataset.mini=edge||'');
window.mfPetRender.onCursor((point)=>{if(!['idle','dozing','mini-idle'].includes(currentState))return;const rect=container.getBoundingClientRect();const dx=Math.max(-3,Math.min(3,(point.x-(rect.left+rect.width*.489))/100));const dy=Math.max(-1.5,Math.min(1.5,(point.y-(rect.top+rect.height*.756))/140));eye={x:dx,y:dy};applyEyes()});
</script></body></html>
