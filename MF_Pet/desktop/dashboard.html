<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MF_Pet Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f6f7f9;
      color: #18212b;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 30px 38px 18px;
      border-bottom: 1px solid #e0e5eb;
      background: #ffffff;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }
    .meta {
      margin-top: 6px;
      color: #667281;
      font-size: 13px;
    }
    .toolbar {
      display: flex;
      gap: 10px;
    }
    button {
      min-height: 34px;
      border: 1px solid #d7dde4;
      border-radius: 8px;
      background: #ffffff;
      color: #17202a;
      font: inherit;
      padding: 0 13px;
    }
    button:hover { background: #f1f3f6; }
    main {
      padding: 24px 38px 36px;
    }
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .filters button[data-active="true"] {
      border-color: #d87455;
      background: #fff0eb;
      color: #a8472e;
      font-weight: 800;
    }
    .list {
      display: grid;
      gap: 12px;
    }
    .empty {
      min-height: 220px;
      display: grid;
      place-items: center;
      border: 1px dashed #cfd6df;
      border-radius: 8px;
      color: #778292;
      background: #ffffff;
    }
    .card {
      display: grid;
      gap: 10px;
      border: 1px solid #dfe5eb;
      border-radius: 8px;
      background: #ffffff;
      padding: 16px;
      box-shadow: 0 8px 22px rgba(31, 41, 51, 0.06);
    }
    .card-head {
      display: grid;
      grid-template-columns: 12px minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #30a46c;
    }
    .dot[data-badge="waiting"] { background: #d99b2b; }
    .dot[data-badge="blocked"] { background: #cc3f3f; }
    .dot[data-badge="done"] { background: #4c9a6a; }
    .title {
      overflow: hidden;
      font-size: 17px;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .badge {
      border-radius: 999px;
      background: #edf1f5;
      color: #566171;
      font-size: 12px;
      font-weight: 800;
      padding: 4px 9px;
    }
    .details {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      color: #647080;
      font-size: 13px;
    }
    .details span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .events {
      color: #4f5b68;
      font-size: 13px;
      line-height: 1.45;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Dashboard</h1>
      <div class="meta" id="summary">等待连接</div>
    </div>
    <div class="toolbar">
      <button id="showPet">显示精灵</button>
      <button id="openChat">打开聊天</button>
      <button id="openSettings">设置</button>
    </div>
  </header>
  <main>
    <div class="filters">
      <button data-filter="all" data-active="true">全部</button>
      <button data-filter="running">运行</button>
      <button data-filter="waiting">等待</button>
      <button data-filter="done">完成</button>
    </div>
    <section class="list" id="list"></section>
  </main>
  <script>
    let snapshot = null;
    let filter = "all";

    function command(name, payload) {
      window.mfPetShell.command(name, payload || {});
    }

    function titleOf(session) {
      return session.displayTitle || session.title || session.sessionTitle || session.id || "Untitled";
    }

    function matches(session) {
      if (filter === "running") return session.badge === "running";
      if (filter === "waiting") return session.badge === "waiting" || session.badge === "blocked";
      if (filter === "done") return session.badge === "done";
      return true;
    }

    function render(next) {
      snapshot = next || {};
      const sessions = (snapshot.sessions || []).filter((session) => !session.hiddenFromDashboard);
      const visible = sessions.filter(matches);
      document.getElementById("summary").textContent =
        `${sessions.length} 个会话 / 状态 ${snapshot.state || "未连接"} / ${snapshot.mini ? "Mini" : "桌面"}`;
      const list = document.getElementById("list");
      list.replaceChildren();
      if (!visible.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = sessions.length ? "当前筛选下暂无会话。" : "暂无会话。";
        list.append(empty);
        return;
      }
      visible.forEach((session) => {
        const card = document.createElement("article");
        card.className = "card";
        const head = document.createElement("div");
        head.className = "card-head";
        const dot = document.createElement("span");
        dot.className = "dot";
        dot.dataset.badge = session.badge || "idle";
        const title = document.createElement("div");
        title.className = "title";
        title.textContent = titleOf(session);
        const badge = document.createElement("span");
        badge.className = "badge";
        badge.textContent = session.badge || session.state || "idle";
        head.append(dot, title, badge);

        const details = document.createElement("div");
        details.className = "details";
        [session.agentLabel || session.agentId || "MF_Pet", session.state || "", session.host || session.provider || ""]
          .forEach((value) => {
            const span = document.createElement("span");
            span.textContent = value;
            span.title = value;
            details.append(span);
          });

        const event = document.createElement("div");
        event.className = "events";
        const lastEvent = session.lastEvent || (session.recentEvents || []).slice(-1)[0];
        event.textContent = lastEvent ? `${lastEvent.event || "event"} -> ${lastEvent.state || session.state}` : "暂无事件";

        const actions = document.createElement("div");
        actions.className = "actions";
        [
          ["focusSession", "定位"],
          ["acknowledgeSession", "已读"],
          ["hideSession", "隐藏"],
          ["endSession", "结束"],
        ].forEach(([name, label]) => {
          const button = document.createElement("button");
          button.textContent = label;
          button.addEventListener("click", () => command(name, { id: session.id }));
          actions.append(button);
        });

        card.append(head, details, event, actions);
        list.append(card);
      });
    }

    document.querySelectorAll("[data-filter]").forEach((button) => {
      button.addEventListener("click", () => {
        filter = button.dataset.filter;
        document.querySelectorAll("[data-filter]").forEach((item) => {
          item.dataset.active = String(item === button);
        });
        render(snapshot);
      });
    });
    document.getElementById("showPet").addEventListener("click", () => command("show"));
    document.getElementById("openChat").addEventListener("click", () => command("openChat"));
    document.getElementById("openSettings").addEventListener("click", () => window.mfPetShell.openSettings());
    window.mfPetShell.onSnapshot(render);
    window.mfPetShell.getSnapshot().then(render);
  </script>
</body>
</html>
